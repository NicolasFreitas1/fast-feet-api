name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://docker:docker@localhost:5432/fast-feet-api?schema=public

    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: docker
          POSTGRES_PASSWORD: docker
          POSTGRES_DB: fast-feet-api
        options: >-
          --health-cmd "pg_isready -U docker -d fast-feet-api"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prisma generate
      - run: pnpm run lint
      - run: pnpm run test
      - name: Generate test JWT keys
        run: |
          private_key=$(openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 | base64 -w 0)
          public_key=$(printf '%s' "$private_key" | base64 -d | openssl rsa -pubout 2>/dev/null | base64 -w 0)
          echo "JWT_PRIVATE_KEY=$private_key" >> "$GITHUB_ENV"
          echo "JWT_PUBLIC_KEY=$public_key" >> "$GITHUB_ENV"
      - run: pnpm run test:e2e
        env:
          STORAGE_DRIVER: local
          STORAGE_LOCAL_BASE_URL: http://localhost:3000/uploads
          APP_BASE_URL: http://localhost:3000
